<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <!-- 알약 아이콘용 그라디언트 -->
    <linearGradient id="pill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#E3F2FD"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 장식: 반투명 원들 -->
  <circle cx="150" cy="500" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1050" cy="130" r="250" fill="rgba(255,255,255,0.05)"/>
  <circle cx="600" cy="630" r="300" fill="rgba(255,255,255,0.03)"/>
  <!-- 중앙 알약 아이콘 -->
  <g transform="translate(600,240) rotate(-45)">
    <rect x="-18" y="-45" width="36" height="45" rx="18" fill="#ffffff" opacity="0.9"/>
    <rect x="-18" y="0" width="36" height="45" rx="18" fill="#E3F2FD" opacity="0.9"/>
    <rect x="-18" y="-2" width="36" height="4" fill="#ffffff" opacity="0.9"/>
  </g>
  <!-- 메인 텍스트 -->
  <text x="600" y="380" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle"
        letter-spacing="2">뷰락쿠 vs 코락쿠</text>
  <!-- 서브 텍스트 -->
  <text x="600" y="430" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="28" font-weight="400" fill="rgba(255,255,255,0.8)" text-anchor="middle">
    정확한 비교 분석 가이드</text>
  <!-- 하단 URL -->
  <text x="600" y="580" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="20" font-weight="300" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    km-88-acess-landing-v2</text>
</svg>
