<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#ffffff"/>
  <!-- 알약(pill) 아이콘 -->
  <g transform="translate(16,16) rotate(-45)">
    <!-- 알약 상단 (진한 파란색) -->
    <rect x="-5" y="-12" width="10" height="12" rx="5" fill="#1976D2"/>
    <!-- 알약 하단 (연한 파란색) -->
    <rect x="-5" y="0" width="10" height="12" rx="5" fill="#64B5F6"/>
    <!-- 중앙 연결 라인 -->
    <rect x="-5" y="-1" width="10" height="2" fill="#1976D2"/>
  </g>
</svg>
